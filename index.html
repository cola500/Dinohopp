<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e1929">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Dinohopp">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Dinohopp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0e1929;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;          /* block pinch-zoom + page scroll while playing */
      overscroll-behavior: none;
    }
    /* Prefer dynamic viewport units where supported so mobile browser chrome
       (URL bar) doesn't steal pixels mid-game. */
    @supports (height: 100dvh) {
      html, body { height: 100dvh; }
    }

    #unity-container {
      position: fixed; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #unity-canvas {
      display: block;
      background: #0e1929;
      /* width/height set dynamically by fitCanvas() to lock 16:9 */
    }

    /* Portrait orientation overlay — only shown on touch devices via JS */
    #orientation-overlay {
      position: fixed; inset: 0;
      background: #0e1929;
      color: #ffe28a;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      z-index: 100;
    }
    .show-portrait #orientation-overlay { display: flex; }
    #orientation-overlay .icon { font-size: 80px; margin-bottom: 20px; line-height: 1; }
    #orientation-overlay .text { font-size: 28px; font-weight: 700; line-height: 1.4; }

    /* Subtle fullscreen toggle (top-right, respects safe-area on notched phones) */
    #fullscreen-btn {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      right: max(8px, env(safe-area-inset-right));
      z-index: 50;
      background: rgba(0,0,0,0.45);
      color: #fff;
      border: 0; border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s;
    }
    #fullscreen-btn:hover, #fullscreen-btn:focus { opacity: 1; }
    body.show-portrait #fullscreen-btn { display: none; }
    /* Once user pressed "Maximera", shrink the button so it doesn't keep stealing
       attention (iOS real fullscreen rarely fires, so this is the visible signal
       that the action did *something*). */
    body.maximized #fullscreen-btn {
      opacity: 0.25;
      transform: scale(0.75);
      transform-origin: top right;
    }

    /* iOS-only hint banner — "Add to Home Screen" tip, dismissible.
       Shown only via JS on iOS that isn't already in standalone mode. */
    #ios-hint {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      padding: 10px 12px 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      display: none;
      align-items: center;
      gap: 10px;
      max-width: min(92vw, 480px);
    }
    #ios-hint.visible { display: flex; }
    #ios-hint .dismiss {
      background: transparent;
      color: #fff;
      border: 0;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      opacity: 0.8;
    }
    #ios-hint .dismiss:hover { opacity: 1; }
    body.show-portrait #ios-hint { display: none; } /* don't overlap with portrait overlay */

    /* Simple loading text shown while Unity warms up */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px;
      z-index: 10; pointer-events: none;
    }
    #loading.hidden { display: none; }
    #loading .label { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <div id="orientation-overlay">
    <div class="icon">📱↩️</div>
    <div class="text">Vänd telefonen liggande<br>för att spela Dinohopp</div>
  </div>

  <button id="fullscreen-btn" type="button" aria-label="Maximera spelvy">⛶ Maximera</button>

  <div id="ios-hint" role="status">
    <span>📱 På iPhone: <strong>Dela ⃫</strong> → <strong>"Lägg till på hemskärmen"</strong> för störst spelvy.</span>
    <button class="dismiss" type="button" aria-label="Stäng tips">✕</button>
  </div>
  <div id="loading"><span class="label">Laddar Dinohopp…</span></div>

  <script>
    var ASPECT = 16 / 9;
    var canvas = document.getElementById('unity-canvas');
    var fullscreenBtn = document.getElementById('fullscreen-btn');
    var loading = document.getElementById('loading');
    var body = document.body;

    function isTouchDevice() {
      return ('ontouchstart' in window) || (navigator.maxTouchPoints || 0) > 0;
    }

    /** Fit the canvas inside the viewport while preserving 16:9 (letterboxes). */
    function fitCanvas() {
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var w, h;
      if (vw / vh > ASPECT) {
        // Viewport wider than 16:9 → letterbox sides
        h = vh; w = h * ASPECT;
      } else {
        // Viewport taller than 16:9 → letterbox top/bottom
        w = vw; h = w / ASPECT;
      }
      canvas.style.width  = Math.floor(w) + 'px';
      canvas.style.height = Math.floor(h) + 'px';
    }

    /** Show "rotate your phone" overlay only on actual touch devices in portrait. */
    function updateOrientation() {
      var portrait = window.innerHeight > window.innerWidth;
      if (isTouchDevice() && portrait) {
        body.classList.add('show-portrait');
      } else {
        body.classList.remove('show-portrait');
      }
    }

    function onResize() {
      updateOrientation();
      fitCanvas();
    }

    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', function () {
      // Mobile browsers need a tick to settle layout after a rotation.
      setTimeout(onResize, 100);
    });

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent)
        || (navigator.platform === 'MacIntel' && (navigator.maxTouchPoints || 0) > 1);
    }
    function isStandalone() {
      return (window.navigator.standalone === true)
        || window.matchMedia('(display-mode: standalone)').matches
        || window.matchMedia('(display-mode: fullscreen)').matches;
    }

    function enterMaximizedMode() {
      body.classList.add('maximized');
      window.scrollTo(0, 0);
      // Reflow after potential URL-bar collapse / class change.
      setTimeout(onResize, 50);
    }

    // "Maximera" — try real fullscreen first (Android Chrome works, iOS often refuses),
    // then activate the in-page maximized fallback regardless. Canvas already fills
    // the viewport via fitCanvas(), so this just polishes the visible state.
    fullscreenBtn.addEventListener('click', function () {
      var el = document.documentElement;
      var inFs = document.fullscreenElement || document.webkitFullscreenElement;
      if (inFs) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        body.classList.remove('maximized');
        return;
      }
      try {
        if (el.requestFullscreen) {
          var p = el.requestFullscreen();
          if (p && p.catch) p.catch(function () { /* silently fall through */ });
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
        }
      } catch (e) { /* no-op */ }
      enterMaximizedMode();
    });

    // iOS "Add to Home Screen" hint — show once, dismissible, persists via localStorage.
    var iosHint = document.getElementById('ios-hint');
    var iosDismiss = iosHint && iosHint.querySelector('.dismiss');
    var HINT_KEY = 'dinohopp-ios-hint-dismissed';
    function maybeShowIosHint() {
      if (!iosHint) return;
      if (!isIOS()) return;
      if (isStandalone()) return;  // already added to home screen
      try {
        if (localStorage.getItem(HINT_KEY) === '1') return;
      } catch (e) { /* private mode → ignore */ }
      iosHint.classList.add('visible');
    }
    if (iosDismiss) {
      iosDismiss.addEventListener('click', function () {
        iosHint.classList.remove('visible');
        try { localStorage.setItem(HINT_KEY, '1'); } catch (e) { /* ignore */ }
      });
    }
    maybeShowIosHint();

    // Initial sizing + orientation before Unity loads
    onResize();

    var buildUrl = 'Build';
    var config = {
      arguments: [],
      dataUrl:        buildUrl + '/WebGL.data',
      frameworkUrl:   buildUrl + '/WebGL.framework.js',
      codeUrl:        buildUrl + '/WebGL.wasm',
      streamingAssetsUrl: 'StreamingAssets',
      companyName:    'DefaultCompany',
      productName:    'Dinohopp',
      productVersion: '0.1.0',
    };

    var script = document.createElement('script');
    script.src = buildUrl + '/WebGL.loader.js';
    script.onload = function () {
      createUnityInstance(canvas, config).then(function (unityInstance) {
        loading.classList.add('hidden');
        window._unityInstance = unityInstance;
        onResize();
      }).catch(function (message) {
        loading.innerHTML = '<span class="label">Kunde inte ladda spelet:<br>' + message + '</span>';
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
