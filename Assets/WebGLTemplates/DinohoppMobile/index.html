<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e1929">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0e1929;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;          /* block pinch-zoom + page scroll while playing */
      overscroll-behavior: none;
    }
    /* Prefer dynamic viewport units where supported so mobile browser chrome
       (URL bar) doesn't steal pixels mid-game. */
    @supports (height: 100dvh) {
      html, body { height: 100dvh; }
    }

    #unity-container {
      position: fixed; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #unity-canvas {
      display: block;
      background: #0e1929;
      /* width/height set dynamically by fitCanvas() to lock 16:9 */
    }

    /* Portrait orientation overlay — only shown on touch devices via JS */
    #orientation-overlay {
      position: fixed; inset: 0;
      background: #0e1929;
      color: #ffe28a;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      z-index: 100;
    }
    .show-portrait #orientation-overlay { display: flex; }
    #orientation-overlay .icon { font-size: 80px; margin-bottom: 20px; line-height: 1; }
    #orientation-overlay .text { font-size: 28px; font-weight: 700; line-height: 1.4; }

    /* Subtle fullscreen toggle (top-right, respects safe-area on notched phones) */
    #fullscreen-btn {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      right: max(8px, env(safe-area-inset-right));
      z-index: 50;
      background: rgba(0,0,0,0.45);
      color: #fff;
      border: 0; border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s;
    }
    #fullscreen-btn:hover, #fullscreen-btn:focus { opacity: 1; }
    body.show-portrait #fullscreen-btn { display: none; }

    /* Simple loading text shown while Unity warms up */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px;
      z-index: 10; pointer-events: none;
    }
    #loading.hidden { display: none; }
    #loading .label { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <div id="orientation-overlay">
    <div class="icon">📱↩️</div>
    <div class="text">Vänd telefonen liggande<br>för att spela {{{ PRODUCT_NAME }}}</div>
  </div>

  <button id="fullscreen-btn" type="button" aria-label="Fullskärm">⛶ Fullskärm</button>
  <div id="loading"><span class="label">Laddar {{{ PRODUCT_NAME }}}…</span></div>

  <script>
    var ASPECT = 16 / 9;
    var canvas = document.getElementById('unity-canvas');
    var fullscreenBtn = document.getElementById('fullscreen-btn');
    var loading = document.getElementById('loading');
    var body = document.body;

    function isTouchDevice() {
      return ('ontouchstart' in window) || (navigator.maxTouchPoints || 0) > 0;
    }

    /** Fit the canvas inside the viewport while preserving 16:9 (letterboxes). */
    function fitCanvas() {
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var w, h;
      if (vw / vh > ASPECT) {
        // Viewport wider than 16:9 → letterbox sides
        h = vh; w = h * ASPECT;
      } else {
        // Viewport taller than 16:9 → letterbox top/bottom
        w = vw; h = w / ASPECT;
      }
      canvas.style.width  = Math.floor(w) + 'px';
      canvas.style.height = Math.floor(h) + 'px';
    }

    /** Show "rotate your phone" overlay only on actual touch devices in portrait. */
    function updateOrientation() {
      var portrait = window.innerHeight > window.innerWidth;
      if (isTouchDevice() && portrait) {
        body.classList.add('show-portrait');
      } else {
        body.classList.remove('show-portrait');
      }
    }

    function onResize() {
      updateOrientation();
      fitCanvas();
    }

    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', function () {
      // Mobile browsers need a tick to settle layout after a rotation.
      setTimeout(onResize, 100);
    });

    fullscreenBtn.addEventListener('click', function () {
      var el = document.documentElement;
      var inFs = document.fullscreenElement || document.webkitFullscreenElement;
      if (inFs) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      } else if (el.requestFullscreen) {
        el.requestFullscreen().catch(function () { /* iOS Safari often rejects — fine */ });
      } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
      }
      // iOS Safari may ignore requestFullscreen entirely; the canvas still fills
      // the viewport thanks to fitCanvas(), so play remains possible.
    });

    // Initial sizing + orientation before Unity loads
    onResize();

    var buildUrl = 'Build';
    var config = {
      arguments: [],
      dataUrl:        buildUrl + '/{{{ DATA_FILENAME }}}',
      frameworkUrl:   buildUrl + '/{{{ FRAMEWORK_FILENAME }}}',
      codeUrl:        buildUrl + '/{{{ CODE_FILENAME }}}',
      streamingAssetsUrl: 'StreamingAssets',
      companyName:    '{{{ COMPANY_NAME }}}',
      productName:    '{{{ PRODUCT_NAME }}}',
      productVersion: '{{{ PRODUCT_VERSION }}}',
    };

    var script = document.createElement('script');
    script.src = buildUrl + '/{{{ LOADER_FILENAME }}}';
    script.onload = function () {
      createUnityInstance(canvas, config).then(function (unityInstance) {
        loading.classList.add('hidden');
        window._unityInstance = unityInstance;
        onResize();
      }).catch(function (message) {
        loading.innerHTML = '<span class="label">Kunde inte ladda spelet:<br>' + message + '</span>';
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
